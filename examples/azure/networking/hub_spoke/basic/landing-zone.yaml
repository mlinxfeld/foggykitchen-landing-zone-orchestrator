landing_zone:
  name: fk-azure-lz-dev
  environment: dev
  owner: foggykitchen
  default_tags:
    project: foggykitchen
    environment: dev
    managed_by: opentofu
    landing_zone: fk-azure-lz-dev

cloud:
  provider: azure
  location: westeurope
  resource_group:
    create: true
    name: rg-fk-azure-lz-dev

architecture:
  topology: hub_spoke
  access_model: private_first
  routing_model: none
  security_model: deny_by_default

features:
  vnet_peering: true
  routing: false
  nsg: true
  nat_gateway: true
  bastion: true
  private_dns: false
  compute: false
  internal_load_balancer: false
  firewall: false
  private_endpoint: false

networking:
  hub:
    name: vnet-fk-hub-dev
    address_space:
      - 10.10.0.0/16
    subnets:
      bastion:
        name: AzureBastionSubnet
        cidr: 10.10.0.0/26
      shared:
        name: snet-fk-shared-services
        cidr: 10.10.1.0/24

  spokes:
    app:
      name: vnet-fk-app-dev
      address_space:
        - 10.20.0.0/16
      subnets:
        frontend:
          name: snet-fk-app-frontend
          cidr: 10.20.1.0/24
        backend:
          name: snet-fk-app-backend
          cidr: 10.20.2.0/24

    data:
      name: vnet-fk-data-dev
      address_space:
        - 10.30.0.0/16
      subnets:
        database:
          name: snet-fk-data-private
          cidr: 10.30.1.0/24
        private_endpoints:
          name: snet-fk-data-private-endpoints
          cidr: 10.30.2.0/24

peering:
  hub_to_spokes: true
  allow_forwarded_traffic: true
  allow_gateway_transit: false
  use_remote_gateways: false

security:
  nsg:
    enabled: true
    baseline_rules:
      deny_internet_inbound: true
      allow_http_from_load_balancer: true
      allow_ssh_from_bastion_or_hub: true

nat_gateway:
  enabled: true
  names:
    app: natgw-fk-app-dev
    data: natgw-fk-data-dev
  public_ip_names:
    app: natgw-fk-app-dev-pip
    data: natgw-fk-data-dev-pip
  attach_to_subnets:
    - app.backend
    - data.database

bastion:
  enabled: true
  name: bastion-fk-dev
  subnet_ref: hub.bastion
  sku: Standard
