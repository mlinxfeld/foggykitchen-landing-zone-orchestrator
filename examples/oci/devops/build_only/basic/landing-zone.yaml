landing_zone:
  name: fk-oci-devops-build-only-dev
  environment: dev
  freeform_tags:
    project: foggykitchen
    environment: dev
    managed_by: opentofu
    landing_zone: fk-oci-devops-build-only-dev

cloud:
  provider: oci
  home_region: eu-frankfurt-1
  tenancy_ocid: ocid1.tenancy.oc1..exampleuniqueid
  compartment_ocid: ocid1.compartment.oc1..exampleuniqueid

architecture:
  topology: devops_build_only
  access_model: source_mirror
  delivery_model: build_and_deliver

devops:
  project:
    name: fk-devops-build-only-dev
    description: FoggyKitchen OCI DevOps build-only pattern
    enable_notifications: true
    enable_logging: true

  github:
    repository_name: foggykitchen-hello-world
    repository_url: https://github.com/foggykitchen/foggykitchen-hello-world.git
    branch: main
    pat_secret_ocid: ocid1.vaultsecret.oc1..exampleuniqueid

  registry:
    repository_name: fkhello/fkhello

  build_pipeline:
    name: fk-devops-build-only-pipeline
    description: FoggyKitchen OCI DevOps build-only pipeline
    build_stage:
      name: build
      description: Build Docker image from mirrored repository source
      build_spec_file: build_spec.yaml
      image: OL7_X86_64_STANDARD_10
      timeout_in_seconds: 36000
    deliver_stage:
      name: deliver
      description: Deliver OCI Registry artifact metadata
      artifact_name: APPLICATION_DOCKER_IMAGE
